# TradePilot AI — Internal gateway Nginx configuration (TP-1702 / TP-1703)
#
# This gateway runs inside Docker and binds to 127.0.0.1:<gateway-port>.
# TLS is terminated by the host Nginx/Certbot.
#
# Routes: frontend (default), API (/api/), health (/health).

upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # ------------------------------------------------------------------
    # Upload size limit
    # ------------------------------------------------------------------
    client_max_body_size 10m;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header X-XSS-Protection          "0" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ------------------------------------------------------------------
    # Frontend (default)
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # Backend API
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # Health endpoints
    # ------------------------------------------------------------------
    location /health {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # Deny direct access to evidence storage paths (defence-in-depth;
    # evidence is only accessible through the authenticated backend route).
    # ------------------------------------------------------------------
    location /data/evidence {
        deny all;
    }
    location /storage/ {
        deny all;
    }
}
